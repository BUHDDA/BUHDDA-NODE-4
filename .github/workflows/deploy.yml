name: Deploy Node 4 BUHDDA Canister to ICP Mainnet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=true sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

      - name: Set up DFX identity from secret
        run: |
          mkdir -p ~/.config/dfx/identity/buhdda-node4
          echo "${{ secrets.DFX_IDENTITY_PEM }}" > ~/.config/dfx/identity/buhdda-node4/identity.pem
          chmod 600 ~/.config/dfx/identity/buhdda-node4/identity.pem
          dfx identity use buhdda-node4

      - name: Check balances
        run: |
          export DFX_WARNING=-mainnet_plaintext_identity
          dfx identity get-principal
          dfx ledger balance --network ic
          dfx identity get-wallet --network ic 2>&1 || echo "No wallet yet"

      - name: Bootstrap cycles wallet
        run: |
          export DFX_WARNING=-mainnet_plaintext_identity
          PRINCIPAL=$(dfx identity get-principal)
          EXISTING=$(dfx identity get-wallet --network ic 2>&1 || true)
          if echo "$EXISTING" | grep -qE '^[a-z0-9]+-[a-z0-9]'; then
            WALLET_ID=$(echo "$EXISTING" | tr -d '[:space:]')
            echo "Using existing wallet: $WALLET_ID"
          else
            OUTPUT=$(dfx ledger create-canister "$PRINCIPAL" --amount 0.5 --network ic 2>&1)
            echo "$OUTPUT"
            WALLET_ID=$(echo "$OUTPUT" | grep -oE '[a-z0-9]+-[a-z0-9]+-[a-z0-9]+-[a-z0-9]+-[a-z0-9]+' | tail -1)
            echo "New canister ID: $WALLET_ID"
            dfx identity deploy-wallet "$WALLET_ID" --network ic
          fi
          echo "WALLET_ID=$WALLET_ID" >> $GITHUB_ENV

      - name: Deploy Node 4 canister to ICP mainnet
        run: |
          export DFX_WARNING=-mainnet_plaintext_identity
          dfx deploy node4_buhdda --network ic --wallet "$WALLET_ID" --yes

      - name: Get canister ID
        run: |
          export DFX_WARNING=-mainnet_plaintext_identity
          dfx canister id node4_buhdda --network ic
